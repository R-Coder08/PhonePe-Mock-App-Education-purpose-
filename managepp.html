<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PhonePe – Manage Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pp:#5f259f;--pp-soft:#ede4f9;--green:#1db954;--g100:#f7f7fb;--g200:#eeecf5;--g400:#b0a8c8;--g600:#6b6383;--g900:#1a1229}
html,body{width:100%;min-height:100%;font-family:'Nunito',sans-serif;background:var(--g100);overflow-x:hidden}

.header{width:100%;background:var(--pp);padding:14px;position:sticky;top:0;z-index:199;display:flex;align-items:center;justify-content:space-between}
.back-btn{width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;font-size:16px}
.header-title{font-size:17px;font-weight:900;color:#fff}

.content{padding:20px 14px 90px;display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px rgba(95,37,159,.07)}
.sec-title{font-size:16px;font-weight:900;color:var(--g900);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title i{color:var(--pp)}

.form-group{margin-bottom:16px}
.form-label{font-size:12.5px;font-weight:800;color:var(--g600);margin-bottom:6px;display:block}
.form-input{width:100%;height:46px;background:var(--g100);border:1.5px solid var(--g200);border-radius:12px;padding:0 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--g900);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--pp)}

.btn-save{width:100%;height:50px;background:var(--pp);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s;margin-top:10px}
.btn-save:active{transform:scale(.97)}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,.95);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:800;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;box-shadow:0 4px 15px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="header-title">Manage PhonePe Mock</div>
  <div style="width:36px"></div>
</div>

<div class="content">
  <!-- Default Receiver Settings -->
  <div class="card">
    <div class="sec-title"><i class="fa-solid fa-user-tag"></i> Default Unknown User (QR Scan)</div>
    <div class="form-group">
      <label class="form-label">Receiver Name</label>
      <input type="text" id="custName" class="form-input" placeholder="E.g. Rahul Kumar">
    </div>
    <div class="form-group">
      <label class="form-label">Receiver UPI ID</label>
      <input type="text" id="custUpi" class="form-input" placeholder="E.g. rahul@ybl">
    </div>
  </div>

  <!-- My Bank Settings -->
  <div class="card">
    <div class="sec-title"><i class="fa-solid fa-building-columns"></i> My Account Details</div>
    <div class="form-group">
      <label class="form-label">My Bank Name & Acc No.</label>
      <input type="text" id="custBank" class="form-input" placeholder="E.g. State Bank of India · XXXX 1234">
    </div>
    <div class="form-group">
      <label class="form-label">Available Balance (₹)</label>
      <input type="number" id="custBal" class="form-input" placeholder="E.g. 50000">
    </div>
    <button class="btn-save" onclick="saveSettings()"><i class="fa-solid fa-floppy-disk"></i> Save Settings</button>
  </div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-check" style="color:var(--green);margin-right:6px"></i> Settings Saved!</div>

<script>
// Load existing settings on page load
window.onload = () => {
  document.getElementById('custName').value = localStorage.getItem('pp_custom_name') || '';
  document.getElementById('custUpi').value = localStorage.getItem('pp_custom_upi') || '';
  document.getElementById('custBank').value = localStorage.getItem('pp_custom_bank') || '';
  document.getElementById('custBal').value = localStorage.getItem('pp_custom_bal') || '';
};

// Save settings to localStorage
function saveSettings() {
  const name = document.getElementById('custName').value.trim();
  const upi = document.getElementById('custUpi').value.trim();
  const bank = document.getElementById('custBank').value.trim();
  const bal = document.getElementById('custBal').value.trim();

  if(name) localStorage.setItem('pp_custom_name', name);
  if(upi) localStorage.setItem('pp_custom_upi', upi);
  if(bank) localStorage.setItem('pp_custom_bank', bank);
  if(bal) localStorage.setItem('pp_custom_bal', bal);

  showToast();
}

let toastTimer;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
